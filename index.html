<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分拣机器人智能评价系统</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 动态背景 -->
    <div class="animated-bg">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
    </div>

    <div class="wrapper">
        <!-- 导航栏 -->
        <nav class="navbar">
            <div class="logo">
                <span class="logo-icon">🤖</span>
                <div>
                    <h1>分拣机器人智能评价系统</h1>
                    <p>智能评价 · 数据分析 · 学习追踪</p>
                </div>
            </div>
            <div class="nav-actions">
                <button class="btn btn-primary" onclick="showToast('📊 正在生成报告...')">📥 导出报告</button>
                <button class="btn" onclick="showToast('🔄 数据已刷新')">🔄 刷新</button>
            </div>
        </nav>

        <!-- 统计概览 -->
        <section class="stats-section">
            <div class="stat-card stat-1">
                <div class="stat-icon">👥</div>
                <div class="stat-info">
                    <span class="stat-label">学生总数</span>
                    <span class="stat-value" id="totalStudents">0</span>
                    <span class="stat-desc">6 个学习小组</span>
                </div>
            </div>
            <div class="stat-card stat-2">
                <div class="stat-icon">📈</div>
                <div class="stat-info">
                    <span class="stat-label">班级平均分</span>
                    <span class="stat-value" id="avgScore">0</span>
                    <span class="stat-desc" id="avgLevel">良好</span>
                </div>
            </div>
            <div class="stat-card stat-3">
                <div class="stat-icon">⭐</div>
                <div class="stat-info">
                    <span class="stat-label">优秀率</span>
                    <span class="stat-value" id="excellentRate">0%</span>
                    <span class="stat-desc">≥90 分</span>
                </div>
            </div>
            <div class="stat-card stat-4">
                <div class="stat-icon">✅</div>
                <div class="stat-info">
                    <span class="stat-label">达标率</span>
                    <span class="stat-value" id="passRate">0%</span>
                    <span class="stat-desc">≥70 分</span>
                </div>
            </div>
        </section>

        <!-- 图表区域 -->
        <section class="charts-section">
            <div class="chart-row">
                <div class="chart-card main">
                    <h3>📊 各组综合得分对比</h3>
                    <div class="chart-container" style="height: 300px;">
                        <canvas id="groupBarChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="chart-row">
                <div class="chart-card">
                    <h3>📈 6 周成绩趋势</h3>
                    <div class="chart-container" style="height: 250px;">
                        <canvas id="trendChart"></canvas>
                    </div>
                </div>
                <div class="chart-card">
                    <h3>🎯 能力维度分析</h3>
                    <div class="chart-container" style="height: 250px;">
                        <canvas id="radarChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="chart-row">
                <div class="chart-card wide">
                    <h3>📋 过程评价明细</h3>
                    <div class="chart-container" style="height: 300px;">
                        <canvas id="processChart"></canvas>
                    </div>
                </div>
                <div class="chart-card">
                    <h3>🏅 技能点掌握</h3>
                    <div class="chart-container" style="height: 300px;">
                        <canvas id="skillChart"></canvas>
                    </div>
                </div>
            </div>
        </section>

        <!-- 数据表格 -->
        <section class="table-section">
            <h3>📋 各组详细成绩</h3>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th style="min-width: 50px;">排名</th>
                            <th style="min-width: 80px;">组别</th>
                            <th style="min-width: 60px;">课前</th>
                            <th style="min-width: 60px;">课中</th>
                            <th style="min-width: 60px;">课后</th>
                            <th style="min-width: 60px;">知识</th>
                            <th style="min-width: 60px;">技能</th>
                            <th style="min-width: 60px;">素养</th>
                            <th style="min-width: 60px;">证书</th>
                            <th style="min-width: 70px;">总分</th>
                            <th style="min-width: 80px;">等级</th>
                        </tr>
                    </thead>
                    <tbody id="scoreTable"></tbody>
                </table>
            </div>
        </section>

        <!-- 小组成员 -->
        <section class="members-section">
            <h3>👥 小组成员名单</h3>
            <div class="members-grid" id="membersGrid"></div>
        </section>

        <!-- 页脚 -->
        <footer>
            <p>分拣机器人操作与编程智能评价系统 © 2024</p>
            <p>职业教育实训平台 | 工业机器人系统操作员 1+X 技能点</p>
        </footer>
    </div>

    <!-- 加载动画 -->
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>正在加载数据...</p>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script src="js/data.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="js/charts.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
